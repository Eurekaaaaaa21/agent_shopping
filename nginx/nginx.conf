events {
    worker_connections 1024;
}

http {
    upstream shop_service {
        server shop-service:8001;
    }

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 10M;

        # 健康检查
        location /health {
            proxy_pass http://shop_service/health;
        }

        # 电商服务
        location /api/shop/ {
            proxy_pass http://shop_service/api/shop/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI 客服服务（预留，ai-service 上线后取消注释）
        # location /api/ai/ {
        #     proxy_pass http://ai-service:8002/api/ai/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_buffering off;
        #     proxy_cache off;
        #     proxy_read_timeout 300s;
        # }

        # 前端页面
        location / {
            proxy_pass http://shop_service/;
            proxy_set_header Host $host;
            proxy_cache off;
            proxy_no_cache 1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }
    }
}
