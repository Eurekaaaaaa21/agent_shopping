services:
  postgres:
    image: postgres:16
    container_name: shop-postgres
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop123
      POSTGRES_DB: shop_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shop-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  shop-service:
    build:
      context: ./shop-service
      dockerfile: Dockerfile
    container_name: shop-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://shop:shop123@postgres:5432/shop_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-secret-key-12345
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: shop-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shop-service

volumes:
  pgdata:
